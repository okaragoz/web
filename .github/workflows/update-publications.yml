name: Update publications (ORCID + Scholar)

on:
  schedule:
    - cron: '0 6 * * 1'   # every Monday 06:00 UTC
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-publications
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch publications from ORCID (+ Scholar best-effort)
        run: node scripts/update-publications.mjs
      - name: Commit if the list changed
        run: |
          if ! git diff --quiet -- docs/.vitepress/data/publications.json; then
            git config user.name "publications-bot"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/.vitepress/data/publications.json
            git commit -m "chore: auto-update publications from ORCID/Scholar"
            git push
            echo "Publications updated."
          else
            echo "No changes."
          fi
